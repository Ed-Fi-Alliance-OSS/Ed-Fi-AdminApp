name: API Bruno E2E

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to test against'
        required: true
        default: 'ci'
        type: choice
        options:
          - ci
          - local

jobs:
  bruno-e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh
    strategy:
      fail-fast: false
    
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      
      - name: Install Bruno CLI
        run: |
          npm install -g @usebruno/cli

      - name: Create .crt file for localhost
        run: |
          bash './compose/ssl/generate-certificate.sh'

      - name: Wait for certificate file
        run: |
          cd compose/ssl
          TIMEOUT=30; SECONDS=0; until [ -f "server.crt" ] || (( SECONDS >= TIMEOUT )); do sleep 1; done
      
      - name: Start Docker Compose services
        if: success()
        run: |
          cd compose
          cp .env.example .env
          ./start-services.ps1 -Rebuild
      
      - name: Wait for services to be ready
        run: |
          sleep 30
          bash curl -k https://localhost/adminapp-api/api/healthcheck || echo "Services starting..."
      
      - name: Run Bruno E2E tests
        run: |
          ./tests/api/run-bruno.ps1 -Env ci -BootstrapAuth
        env:
          OIDC_ISSUER: https://localhost/auth/realms/edfi
          OIDC_CLIENT_ID: edfiadminapp-machine
          OIDC_CLIENT_SECRET: ${{ secrets.OIDC_CLIENT_SECRET || 'edfi-machine-secret-456' }}
          OIDC_USERNAME: edfi-admin
          OIDC_PASSWORD: '123'
          OIDC_ADMIN_USER: admin
          OIDC_ADMIN_PASSWORD: admin
          API_BASE_URL: https://localhost/adminapp-api/api
          NODE_EXTRA_CA_CERTS: /etc/ssl/certs/ca-certificates.crt
      
      - name: Publish test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bruno-test-results
          path: tests/api/test-results/
          retention-days: 30
      
      - name: Stop services
        if: always()
        run: |
          ./compose/stop.ps1
